<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vantyr</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* First-paint background + boot splash — shown before the JS bundle mounts,
         so the page never flashes white/black. React replaces #root on mount. */
      html, body { margin: 0; background-color: #08090b; color-scheme: dark; }
      #boot-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #08090b;
      }
      #boot-splash .ring {
        width: 42px; height: 42px; border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: #20dd8f;
        animation: boot-spin 0.85s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash"><div class="ring"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
