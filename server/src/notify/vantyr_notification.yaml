blueprint:
  name: "Vantyr Alert"
  description: "Triggers on vantyr_alert and sends an actionable push to a selected mobile_app device, deep-linking to the agent activity timeline at the event time."
  domain: automation

  input:
    phone_device:
      name: Phone (Home Assistant Companion device)
      description: "Pick the mobile device that should receive the push."
      selector:
        device:
          filter:
            integration: mobile_app

    title_prefix:
      name: Title prefix
      default: "Vantyr"
      selector:
        text: {}

    notification_icon:
      name: Notification icon (optional)
      description: "MDI icon name (e.g. mdi:alert). Leave blank for default."
      default: ""
      selector:
        text: {}

    notification_color:
      name: Notification color (optional)
      description: "Notification color. Mainly used on Android (status bar / icon tint)."
      default: [255, 0, 0]
      selector:
        color_rgb: {}

mode: queued

trigger:
  - platform: event
    event_type: vantyr_alert

variables:
  phone_device: !input phone_device
  title_prefix: !input title_prefix
  notification_icon: !input notification_icon
  notification_color: !input notification_color

  # Companion notify service is derived from the device name.
  notify_service: >-
    {{ 'notify.mobile_app_' ~ (device_attr(phone_device, 'name') | slugify) }}

  # Prefer server-provided deep link (requires PUBLIC_BASE_URL on the Vantyr server).
  deep_url: >-
    {{ trigger.event.data.dashboard_activity_url
       | default(trigger.event.data.dashboard_url | default('')) }}

  # Convert [r,g,b] to "#rrggbb"
  notification_color_hex: >-
    {{ '#%02x%02x%02x' | format(notification_color[0], notification_color[1], notification_color[2]) }}

action:
  - service: "{{ notify_service }}"
    data:
      title: "{{ title_prefix }}: {{ trigger.event.data.rule_name }}"
      message: >-
        {{ trigger.event.data.agent_name }} ({{ trigger.event.data.channel }}):
        {{ trigger.event.data.snippet }}
      data:
        # Tap notification body → open deep link
        # iOS uses `url`; Android uses `clickAction`.
        url: "{{ deep_url }}"
        clickAction: "{{ deep_url }}"
        # Presentation (mostly mobile-app specific)
        notification_icon: "{{ notification_icon }}"
        color: "{{ notification_color_hex }}"

