services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.example to .env and set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-monitor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/gladsonsam/vantyr/server:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-monitor}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-monitor}
      LOG_FORCE_COLOR: "1"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
