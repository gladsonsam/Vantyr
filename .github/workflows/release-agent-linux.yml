name: Release Linux Agent

on:
  workflow_dispatch:
  push:
    tags:
      - "agent-linux-v*"

permissions:
  contents: read

jobs:
  build-linux-agent:
    name: build linux agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxtst-dev libxdo-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev libdbus-1-dev \
            libpipewire-0.3-dev libwayland-dev libxkbcommon-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: agent
        run: cargo build --release

      - name: Stage artifact
        run: |
          mkdir -p dist/vantyr-agent-linux/packaging
          cp agent/target/release/vantyr-agent dist/vantyr-agent-linux/
          cp -R agent/packaging/linux dist/vantyr-agent-linux/packaging/
          tar -C dist -czf vantyr-agent-linux-x86_64.tar.gz vantyr-agent-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vantyr-agent-linux-x86_64
          path: vantyr-agent-linux-x86_64.tar.gz
