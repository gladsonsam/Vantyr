name: release-agent-windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Quality gate: agent + agent-UI checks run on publish (tag) before the MSI is built/released.
  checks:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent -> target

      - name: Agent format check
        working-directory: agent
        run: cargo fmt --check

      - name: Agent check
        working-directory: agent
        run: cargo check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/ui-src/package-lock.json

      - name: Agent UI install
        working-directory: agent/ui-src
        run: npm ci

      - name: Agent UI lint
        working-directory: agent/ui-src
        run: npm run lint

      - name: Agent UI build
        working-directory: agent/ui-src
        run: npm run build

  build-and-release:
    runs-on: windows-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Draft release notes (commits since previous tag)
        id: rel_notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prev="$(git describe --tags --abbrev=0 --exclude="$tag" 2>/dev/null || true)"
          delim="REL_BODY_EOF"
          {
            echo "body<<$delim"
            if [ -n "$prev" ]; then
              git log --no-merges --pretty=format:'- %s (%h)' "${prev}..${tag}"
            else
              git log --no-merges --pretty=format:'- %s (%h)' -n 40 "${tag}"
            fi
            echo ""
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/ui-src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent -> target

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset -y

      - name: Install UI dependencies
        shell: pwsh
        working-directory: agent/ui-src
        run: npm install --no-audit --no-fund

      - name: Stamp versions from git tag
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          if (-not ($ver -match "^\d+\.\d+\.\d+(-[0-9A-Za-z\.-]+)?(\+[0-9A-Za-z\.-]+)?$")) {
            throw "Tag '$tag' is not a SemVer tag like v1.2.3"
          }

          # agent/Cargo.toml
          $cargoToml = "agent/Cargo.toml"
          $cargo = Get-Content $cargoToml -Raw
          $cargo2 = [regex]::Replace($cargo, '^(version\s*=\s*")[^"]+(")', "`${1}$ver`${2}", "Multiline")
          if ($cargo2 -eq $cargo) { throw "Failed to update version in $cargoToml" }
          Set-Content -Path $cargoToml -Value $cargo2 -Encoding utf8 -NoNewline

          # agent/tauri.conf.json
          $tauriConf = "agent/tauri.conf.json"
          $json = Get-Content $tauriConf -Raw | ConvertFrom-Json
          $json.version = $ver
          ($json | ConvertTo-Json -Depth 64) | Set-Content -Path $tauriConf -Encoding utf8

      - name: Build + publish MSI to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent
          tagName: ${{ github.ref_name }}
          releaseName: Sentinel Agent ${{ github.ref_name }}
          releaseBody: ${{ steps.rel_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
