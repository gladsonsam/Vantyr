name: release-server-docker

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  # Quality gate: server + dashboard checks run on publish (tag) before the image is built/pushed.
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Server format check
        run: cargo fmt --all --check

      - name: Server clippy
        run: cargo clippy -p vantyr-server -- -D warnings

      - name: Server check
        run: cargo check -p vantyr-server

      - name: Server test
        run: cargo test -p vantyr-server

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend test
        working-directory: frontend
        run: npm test

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp server version from git tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          if ! echo "$ver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)*$'; then
            echo "Tag '$tag' is not a SemVer tag like v1.2.3" >&2
            exit 1
          fi
          # Replace server package version only (keep other workspace members unchanged)
          perl -0777 -pe 's/\[package\](.*?)\nversion\s*=\s*\"[^\"]+\"/\[package\]$1\nversion = \"'"$ver"'\"/s' \
            -i server/Cargo.toml

          # Keep Cargo.lock consistent so Docker's `cargo build --locked` succeeds.
          # Cargo.lock contains the package version for workspace members.
          VER="$ver" perl -0777 -i -pe 's/(\[\[package\]\]\nname\s*=\s*"vantyr-server"\nversion\s*=\s*")[^"]+(")/${1}$ENV{VER}${2}/s' Cargo.lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/gladsonsam/vantyr/server
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
